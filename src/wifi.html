<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wi-Fi настройка</title>
<!-- Применить сохранённую тему до рендера (избегаем мигания) -->
<script>(function(){try{var t=localStorage.getItem('tkwm-theme');if(t&&t!=='system')document.documentElement.dataset.theme=t;}catch(_){}})()</script>
<style>
  /* Fallback-тема (если /theme.css не загружен в FS) */
  :root {
    --bg:      #0b1220;
    --card:    #0d1728;
    --surface: #0f1a2c;
    --ink:     #e8eef7;
    --mut:     #9fb3d1;
    --br:      #1b2a44;
    --btn:     #143057;
    --link:    #9fd0ff;
    --ok:      #95ffa1;
    --err:     #ff9a9a;
  }
  :root[data-theme="light"] {
    --bg:      #f0f4f8;
    --card:    #ffffff;
    --surface: #e4eaf2;
    --ink:     #1a2236;
    --mut:     #5a7090;
    --br:      #c5d0e0;
    --btn:     #2563eb;
    --link:    #1d4ed8;
    --ok:      #16a34a;
    --err:     #dc2626;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) {
      --bg:      #f0f4f8;
      --card:    #ffffff;
      --surface: #e4eaf2;
      --ink:     #1a2236;
      --mut:     #5a7090;
      --br:      #c5d0e0;
      --btn:     #2563eb;
      --link:    #1d4ed8;
      --ok:      #16a34a;
      --err:     #dc2626;
    }
  }
  body{margin:0;background:var(--bg);color:var(--ink);font:15px system-ui,-apple-system,Segoe UI,Roboto}
  .wrap{max-width:860px;margin:auto;padding:20px}
  .card{background:var(--card);border:1px solid var(--br);border-radius:14px;padding:16px}
  h1{font-size:18px;margin:0 0 12px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  input,button{padding:10px 12px;border-radius:10px;border:1px solid var(--br);background:var(--surface);color:var(--ink)}
  button{background:var(--btn);cursor:pointer}
  a{color:var(--link);text-decoration:none}
  .list{margin-top:12px}
  .net{display:flex;justify-content:space-between;align-items:center;padding:10px;border:1px solid var(--br);border-radius:10px;margin:8px 0;background:var(--surface);cursor:pointer}
  .net small{color:var(--mut)}
  .ok{color:var(--ok)}
  .err{color:var(--err)}
  .mut{color:var(--mut)}
  .hint{margin-top:6px}
  hr{border:0;border-top:1px solid var(--br);margin:14px 0}
</style>
<!-- Тема из FS: загрузите /theme.css (цвета) и /theme.js (кнопка 🌙☀️💻) -->
<link rel="stylesheet" href="/theme.css">
<script src="/theme.js"></script>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Настройка Wi-Fi</h1>

    <div class="row">
      <button id="scanBtn">🔄 Обновить список</button>
      <div id="status" class="mut"></div>
    </div>

    <div id="list" class="list"></div>

    <hr>

    <form id="f" class="row" onsubmit="return save(event)">
      <input id="ssid" placeholder="SSID" required style="flex:1;min-width:180px">
      <input id="pass" placeholder="Пароль" type="password" style="flex:1;min-width:180px">
      <button type="submit">💾 Сохранить</button>
    </form>
    <div id="saveMsg" class="hint"></div>

    <p class="mut hint">Совет: нажмите на сеть выше — SSID подставится автоматически.</p>

    <div class="row" style="margin-top:10px">
      <a href="/">Главная</a>
      <a href="/fs">Файлы</a>
      <a href="/ota">OTA</a>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const list    = $("#list");
const statusEl = $("#status");
const ssidEl  = $("#ssid");
const passEl  = $("#pass");
const scanBtn = $("#scanBtn");
const saveMsg = $("#saveMsg");

async function scan() {
  try {
    scanBtn.disabled = true;
    statusEl.textContent = "Сканирование...";
    list.innerHTML = "";
    const r = await fetch("/api/wifi/scan");
    const j = await r.json();
    statusEl.innerHTML = j.connected
      ? `Подключено • IP: <b>${j.ip || "-"}</b>`
      : "Не подключено";
    (j.nets || []).sort((a, b) => b.rssi - a.rssi).forEach(n => {
      const enc = (n.enc === 0) ? "open" : "🔒";
      const el = document.createElement("div");
      el.className = "net";
      el.innerHTML =
        `<div><b>${esc(n.ssid || "(скрытая)")}</b><br><small>${enc}, ch ${n.ch}</small></div>
         <small>${n.rssi} dBm</small>`;
      el.onclick = () => {
        if (n.ssid) { ssidEl.value = n.ssid; passEl.focus(); }
        else ssidEl.focus();
      };
      list.appendChild(el);
    });
  } catch(e) {
    statusEl.innerHTML = `<span class="err">Ошибка сканирования</span>`;
  } finally {
    scanBtn.disabled = false;
  }
}

function esc(s) {
  return String(s).replace(/[&<>"'`=\/]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;","`":"&#x60;","=":"&#x3D;","/":"&#x2F;"}[m]));
}

async function save(ev) {
  ev.preventDefault();
  saveMsg.textContent = "Сохраняю и подключаюсь...";
  const body = { ssid: ssidEl.value.trim(), password: passEl.value };
  try {
    const r = await fetch("/api/wifi/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    const j = await r.json();
    if (!j.ok) { saveMsg.innerHTML = `<span class="err">${j.msg || "Ошибка"}</span>`; return false; }
    if (j.connected) {
      saveMsg.innerHTML = `<span class="ok">Подключено! IP: <b>${j.ip || "-"}</b></span>`;
    } else {
      saveMsg.innerHTML = `<span class="err">Не удалось подключиться. Проверьте пароль.</span>`;
    }
    scan();
  } catch(e) {
    saveMsg.innerHTML = `<span class="err">Ошибка запроса</span>`;
  }
  return false;
}

scanBtn.onclick = scan;
window.addEventListener("load", scan);
</script>
</body>
</html>
