; TKWifiManager — PlatformIO конфигурация (Arduino framework, ESP32)
; ─────────────────────────────────────────────────────────────────────────────
; Эта библиотека работает ТОЛЬКО с Arduino framework.
; ESP-IDF native не поддерживается (используются WebServer, Preferences,
; LittleFS, DNSServer, Update — все они являются Arduino-обёртками).
;
; Использование:
;   - Добавьте библиотеку в lib_deps вашего проекта:
;       lib_deps = https://github.com/Jkl88/TKWifiManager.git
;   - Или скопируйте папку в <project>/lib/TKWifiManager/
; ─────────────────────────────────────────────────────────────────────────────

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Схема разделения с LittleFS (минимум 1 МБ под FS)
board_build.partitions = min_spiffs.csv

; Зависимости
lib_deps =
    links2004/WebSockets @ ^2.4.1   ; WebSocketsServer

; Скорость монитора
monitor_speed = 115200

; Путь к исходникам (если проект — это сама библиотека с примером)
build_src_filter = +<../../examples/Basic/*>

; Флаги (опционально)
build_flags =
    -DTKWM_USE_LITTLEFS=1
    ; -DTKWM_WS_PORT=81
    ; -DTKWM_DISCOVERY_PORT=64242
    ; -DTKWM_MAX_CRED=16

; ─────────────────────────────────────────────────────────────────────────────
; Загрузка файловой системы (LittleFS)
; Команда: pio run -e esp32dev_upload_fs -t uploadfs
;
; Рекомендуемые файлы в папке data/:
;   data/theme.css   — цветовая схема (тёмная/светлая + [data-theme])
;   data/theme.js    — плавающая кнопка 🌙☀️💻 с сохранением в localStorage
;   data/index.html  — (опционально) замена встроенной главной страницы
;   data/wifi.html   — (опционально) замена встроенной страницы Wi-Fi
;   data/fs.html     — (опционально) замена встроенной страницы файлов
;   data/ota.html    — (опционально) замена встроенной страницы OTA
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32dev_upload_fs]
platform  = espressif32
board     = esp32dev
framework = arduino
board_build.partitions   = min_spiffs.csv
board_build.filesystem   = littlefs
lib_deps =
    links2004/WebSockets @ ^2.4.1
build_flags = -DTKWM_USE_LITTLEFS=1
