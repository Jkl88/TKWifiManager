; Пример PlatformIO: откройте эту папку как проект. Библиотека — в корне репозитория
; на два уровня выше (extras/PlatformioBasic → .. → .. → TKWifiManager).
;
;   pio run
;   pio run -t uploadfs   (окружение esp32dev_upload_fs, если заполнена data/)

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino
board_build.partitions = min_spiffs.csv
lib_deps =
    file://../..
    links2004/WebSockets @ ^2.4.1
build_flags = -DTKWM_USE_LITTLEFS=1
monitor_speed = 115200

[env:esp32dev_upload_fs]
platform  = espressif32
board     = esp32dev
framework = arduino
board_build.partitions   = min_spiffs.csv
board_build.filesystem   = littlefs
lib_deps = file://../.., links2004/WebSockets @ ^2.4.1
build_flags = -DTKWM_USE_LITTLEFS=1
